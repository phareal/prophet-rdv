upstream nuxt_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Redirection HTTP → HTTPS ──────────────────────────────
    # Décommenter ces 2 lignes et commenter le reste après avoir
    # configuré SSL dans le bloc server ci-dessous.
    # return 301 https://$host$request_uri;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/prophet_access.log;
    error_log  /var/log/nginx/prophet_error.log warn;

    # ── Sécurité ─────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Proxy vers Nuxt ──────────────────────────────────────
    location / {
        proxy_pass         http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout  60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout  60s;
    }

    # ── Assets statiques (cache long) ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://nuxt_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_min_length 1000;

    # ── Taille max upload ─────────────────────────────────────
    client_max_body_size 10M;
}

