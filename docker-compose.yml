version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prophet_rdv_app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/prophetrdv
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - prophet_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    container_name: prophet_rdv_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - prophet_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: prophet_rdv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # Monter les certs SSL ici
    depends_on:
      - app
    networks:
      - prophet_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  mongo_data:
    driver: local

networks:
  prophet_net:
    driver: bridge
