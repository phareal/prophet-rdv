version: '3.9'

services:

  # ── Reverse proxy (HTTPS automatique via Let's Encrypt) ──────────────────
  caddy:
    image: caddy:2-alpine
    container_name: prophet_rdv_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificats Let's Encrypt (ne pas supprimer !)
      - caddy_config:/config  # cache de configuration Caddy
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - app
    networks:
      - prophet_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Application Nuxt ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prophet_rdv_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/prophetrdv
      API_BRIDGE_URL: http://api-bridge:4000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN}
    depends_on:
      mongo:
        condition: service_healthy
      api-bridge:
        condition: service_healthy
    networks:
      - prophet_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Pont API (YouTube + Google Calendar) ─────────────────────────────────
  api-bridge:
    build:
      context: ./api-bridge
      dockerfile: Dockerfile
    container_name: prophet_rdv_bridge
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      ALLOWED_ORIGINS: https://${DOMAIN}
    networks:
      - prophet_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Base de données ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: prophet_rdv_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - prophet_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  mongo_data:
    driver: local
  caddy_data:      # IMPORTANT : ne jamais supprimer ce volume en production
    driver: local
  caddy_config:
    driver: local

networks:
  prophet_net:
    driver: bridge
